<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>scheng editor</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

:root {
  --bg:#0c0c0f; --bg1:#13131a; --bg2:#1a1a24; --bg3:#22222f;
  --border:#252535; --border-hi:#353550;
  --accent:#5b6eff; --accent2:#ff5f5f; --accent3:#3fffc8; --yellow:#ffd166;
  --text:#ddddf0; --text2:#7777a0; --text3:#44445a;
  --node-w:220px; --port-r:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden}
body{font-family:'IBM Plex Mono',monospace;background:var(--bg);color:var(--text);
  display:grid;grid-template-rows:42px 1fr;grid-template-columns:1fr 280px;
  grid-template-areas:"hdr hdr""cvs pnl"}

/* HEADER */
header{grid-area:hdr;display:flex;align-items:center;gap:10px;padding:0 14px;
  background:var(--bg1);border-bottom:1px solid var(--border);user-select:none}
.logo{font-family:'IBM Plex Sans',sans-serif;font-weight:600;font-size:15px;color:var(--text)}
.logo em{color:var(--accent);font-style:normal}
.hgap{flex:1}
.hstatus{display:flex;align-items:center;gap:7px;font-size:10px;color:var(--text2);letter-spacing:.06em}
.dot{width:6px;height:6px;border-radius:50%;background:var(--text3);transition:background .3s,box-shadow .3s}
.dot.on{background:var(--accent3);box-shadow:0 0 6px var(--accent3)}
.dot.err{background:var(--accent2)}
.hbtn{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;
  padding:5px 11px;border-radius:3px;border:1px solid var(--border-hi);background:transparent;
  color:var(--text2);cursor:pointer;transition:all .12s;white-space:nowrap}
.hbtn:hover{color:var(--text);border-color:var(--accent);background:var(--bg3)}
.hbtn.hi{background:var(--accent);color:#fff;border-color:var(--accent)}
.hbtn.hi:hover{filter:brightness(1.15)}
.hbtn.warn{border-color:var(--yellow);color:var(--yellow)}
.hbtn.warn:hover{background:rgba(255,209,102,.1)}
#nc{font-size:9px;letter-spacing:.06em;padding:3px 8px;border-radius:3px;
  background:rgba(255,209,102,.12);color:var(--yellow);border:1px solid rgba(255,209,102,.3);display:none}
#nc.show{display:block}

/* CANVAS */
#cw{grid-area:cvs;position:relative;overflow:hidden;background:var(--bg);
  background-image:radial-gradient(circle,#252535 1px,transparent 1px);background-size:24px 24px}
#cv{position:absolute;inset:0}
svg#el{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;overflow:visible}

/* NODES */
.node{position:absolute;width:var(--node-w);border-radius:6px;border:1px solid var(--border);
  background:var(--bg2);box-shadow:0 3px 16px rgba(0,0,0,.5);user-select:none;z-index:10;
  transition:border-color .12s,box-shadow .12s}
.node:hover{border-color:var(--border-hi)}
.node.sel{border-color:var(--accent);box-shadow:0 0 0 2px rgba(91,110,255,.2),0 3px 16px rgba(0,0,0,.5)}
.stripe{height:3px;border-radius:5px 5px 0 0;background:var(--border-hi)}
.k-shader_source .stripe,.k-shader_pass .stripe{background:var(--accent)}
.k-crossfade .stripe,.k-matrix_mix4 .stripe,.k-add .stripe{background:#a855f7}
.k-pixels_out .stripe,.k-syphon .stripe{background:var(--accent3)}
.nhdr{display:flex;align-items:center;gap:7px;padding:7px 10px 6px;
  cursor:grab;border-bottom:1px solid var(--border)}
.nhdr:active{cursor:grabbing}
.nbadge{font-size:8px;letter-spacing:.12em;text-transform:uppercase;
  padding:2px 5px;border-radius:2px;background:var(--bg3);color:var(--text2);flex-shrink:0}
.nlbl{font-family:'IBM Plex Sans',sans-serif;font-size:11px;font-weight:500;color:var(--text);
  flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nx{width:16px;height:16px;border:none;background:none;color:var(--text3);cursor:pointer;
  font-size:15px;display:flex;align-items:center;justify-content:center;
  border-radius:3px;flex-shrink:0;transition:color .1s,background .1s}
.nx:hover{color:var(--accent2);background:rgba(255,95,95,.12)}
.nports{display:flex;justify-content:space-between;padding:6px 0;min-height:30px}
.pcol{display:flex;flex-direction:column;gap:6px}
.pcol.ins{align-items:flex-start}
.pcol.outs{align-items:flex-end}
.prow{display:flex;align-items:center;gap:4px;height:20px}
.pcol.outs .prow{flex-direction:row-reverse}

/* Port dots — larger hit area, pushed outside node boundary */
.pdot{
  width:calc(var(--port-r)*2); height:calc(var(--port-r)*2);
  border-radius:50%;
  border:2px solid var(--border-hi);
  background:var(--bg);
  cursor:crosshair;flex-shrink:0;
  margin:0 calc(0px - var(--port-r));
  transition:border-color .1s,background .1s,transform .1s;
  position:relative;z-index:20; /* above node content */
  /* Enlarge hit area without changing visual size */
  box-shadow:0 0 0 6px transparent;
}
.pdot:hover{border-color:var(--accent);background:var(--accent);transform:scale(1.3)}
.pdot.wiring{border-color:var(--yellow)!important;background:var(--yellow)!important;transform:scale(1.4)}
.pdot.live{border-color:var(--accent3);background:rgba(63,255,200,.2)}
.pdot.can-connect{border-color:var(--accent3);background:var(--accent3);transform:scale(1.4);animation:pulse .5s infinite alternate}
@keyframes pulse{from{box-shadow:0 0 0 0 rgba(63,255,200,.4)}to{box-shadow:0 0 0 6px rgba(63,255,200,0)}}
.plbl{font-size:9px;color:var(--text3);padding:0 8px}

/* EDGES */
.edge{fill:none;stroke:var(--accent);stroke-width:2;opacity:.6;stroke-linecap:round;pointer-events:visibleStroke}
.edge:hover{opacity:1;stroke-width:2.5;cursor:pointer}
.edge.src-edge{stroke:var(--text3);stroke-dasharray:4 3;opacity:.4}
#dw{fill:none;stroke:var(--yellow);stroke-width:2;opacity:.8;stroke-dasharray:6 4;pointer-events:none}

/* PANEL */
#panel{grid-area:pnl;background:var(--bg1);border-left:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden}
.psec{border-bottom:1px solid var(--border)}
.ptitle{font-size:9px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--text3);padding:9px 13px 7px;font-family:'IBM Plex Sans',sans-serif;font-weight:500}
.ngrid{display:grid;grid-template-columns:1fr 1fr;gap:5px;padding:0 10px 10px}
.ngbtn{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.04em;
  padding:7px 5px;border-radius:4px;border:1px solid var(--border);background:var(--bg2);
  color:var(--text2);cursor:pointer;text-align:center;transition:all .12s;line-height:1.5}
.ngbtn:hover{color:var(--text);border-color:var(--accent);background:var(--bg3)}
.ngbtn span{display:block;font-size:8px;color:var(--text3)}
.tmplgrid{display:flex;flex-direction:column;gap:4px;padding:0 10px 10px}
.tmbtn{font-family:'IBM Plex Mono',monospace;font-size:9px;padding:6px 8px;border-radius:4px;
  border:1px solid var(--border);background:var(--bg2);color:var(--text2);
  cursor:pointer;text-align:left;transition:all .12s}
.tmbtn:hover{color:var(--text);border-color:var(--accent3);background:var(--bg3)}
.tmbtn em{color:var(--text3);font-style:normal;float:right;font-size:8px}
#props{flex:1;overflow-y:auto;padding:10px}
#props::-webkit-scrollbar{width:3px}
#props::-webkit-scrollbar-thumb{background:var(--border)}
.pempty{color:var(--text3);font-size:10px;text-align:center;padding:20px 0;line-height:1.9}
.pf{margin-bottom:10px}
.pf label{display:block;font-size:9px;color:var(--text2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:3px}
.pinput{width:100%;font-family:'IBM Plex Mono',monospace;font-size:10px;background:var(--bg2);
  border:1px solid var(--border);border-radius:3px;color:var(--text);padding:4px 7px;outline:none;transition:border-color .12s}
.pinput:focus{border-color:var(--accent)}
.pinput[readonly]{opacity:.4}
.prow-s{display:flex;align-items:center;gap:6px}
.pslider{flex:1;-webkit-appearance:none;height:3px;border-radius:2px;background:var(--border-hi);cursor:pointer;outline:none}
.pslider::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;border-radius:50%;background:var(--accent);cursor:pointer}
.pval{font-size:9px;color:var(--text3);min-width:30px;text-align:right}
.sbox{font-family:'IBM Plex Mono',monospace;font-size:10px;line-height:1.55;
  background:var(--bg);border:1px solid var(--border);border-radius:3px;
  color:var(--accent3);padding:7px;width:100%;height:200px;resize:vertical;outline:none;tab-size:2;
  transition:border-color .12s}
.sbox:focus{border-color:var(--accent)}
.abtn{margin-top:5px;width:100%;font-family:'IBM Plex Mono',monospace;font-size:9px;
  letter-spacing:.1em;text-transform:uppercase;padding:6px;border-radius:3px;
  border:1px solid var(--accent);background:rgba(91,110,255,.08);color:var(--accent);
  cursor:pointer;transition:all .12s}
.abtn:hover{background:var(--accent);color:#fff}
/* Log */
#log{height:100px;overflow-y:auto;padding:6px 10px;font-size:9px;line-height:1.8;color:var(--text3)}
#log::-webkit-scrollbar{width:2px}
#log::-webkit-scrollbar-thumb{background:var(--border)}
.le{display:flex;gap:7px}
.lt{color:var(--text3);flex-shrink:0}
.lm{color:var(--text2)}
.le.ok .lm{color:var(--accent3)}
.le.err .lm{color:var(--accent2)}
.le.ev .lm{color:var(--accent)}
.le.warn .lm{color:var(--yellow)}
/* Wire hint bar */
#wh{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);
  background:var(--bg3);border:1px solid var(--yellow);border-radius:20px;
  padding:5px 18px;font-size:11px;color:var(--yellow);
  pointer-events:none;opacity:0;transition:opacity .2s;z-index:999}
#wh.show{opacity:1}
</style>
</head>
<body>

<header>
  <div class="logo">sch<em>eng</em></div>
  <div class="hgap"></div>
  <div id="nc">needs compile</div>
  <div class="hstatus"><div class="dot" id="dot"></div><span id="stxt">disconnected</span></div>
  <button class="hbtn" id="btn-connect">connect</button>
  <button class="hbtn warn" id="btn-compile">compile</button>
</header>

<div id="cw">
  <svg id="el"><path id="dw" d=""/></svg>
  <div id="cv"></div>
</div>

<aside id="panel">
  <div class="psec">
    <div class="ptitle">add node</div>
    <div class="ngrid">
      <button class="ngbtn" data-kind="shader_source" data-label="Source">◈ ShaderSrc<span>code source</span></button>
      <button class="ngbtn" data-kind="shader_pass"   data-label="Pass">◧ ShaderPass<span>fx / generate</span></button>
      <button class="ngbtn" data-kind="crossfade"     data-label="Mix">◑ Crossfade<span>blend a+b</span></button>
      <button class="ngbtn" data-kind="matrix_mix4"   data-label="Matrix">⊞ MatrixMix4<span>4-input</span></button>
      <button class="ngbtn" data-kind="pixels_out"    data-label="Output">▣ PixelsOut<span>final output</span></button>
      <button class="ngbtn" data-kind="syphon"        data-label="Syphon">⇡ Syphon<span>send frame</span></button>
    </div>
  </div>
  <div class="psec">
    <div class="ptitle">templates</div>
    <div class="tmplgrid">
      <button class="tmbtn" data-tmpl="basic">Basic colour wheel<em>1 pass</em></button>
      <button class="tmbtn" data-tmpl="twostage">Two-stage FX chain<em>src→A→B→out</em></button>
      <button class="tmbtn" data-tmpl="crossfade">Crossfade mixer<em>two srcs</em></button>
      <button class="tmbtn" data-tmpl="plasma">Plasma / SDF<em>no src node</em></button>
      <button class="tmbtn" data-tmpl="tunnel">UV tunnel<em>loop + time</em></button>
    </div>
  </div>
  <div class="psec">
    <div class="ptitle">properties</div>
    <div id="props"><div class="pempty">click a node<br/>to edit it</div></div>
  </div>
  <div class="psec" style="flex-shrink:0">
    <div class="ptitle">log</div>
    <div id="log"></div>
  </div>
</aside>

<div id="wh">mousedown an INPUT port to finish  ·  esc cancels</div>

<script>
// ═══════════════════════════════════════════════════════════
// ENGINE MODEL (learned from reading runtime source)
//
// ShaderSource → ShaderPass:
//   Code-only edge. ShaderPass runs the ShaderSource's frag.
//   ShaderSource produces NO texture — it's just a shader carrier.
//
// ShaderPass → ShaderPass:
//   Texture edge. Upstream FBO becomes iChannel0 in downstream.
//
// ShaderPass → PixelsOut:
//   Presents the FBO to screen.
//
// So to generate + transform:
//   ShaderSource → PassA → PassB → PixelsOut
//   PassA gets shader from ShaderSource (path 3), generates pixels.
//   PassB has its own shader (path 1), reads PassA as iChannel0.
//
// Uniform names the engine binds: u_time, uTime, iTime, u_resolution, uResolution, iResolution
// Input textures: iChannel0, iChannel1, iChannel2, iChannel3
// ═══════════════════════════════════════════════════════════

const G = {
  nodes:{}, edges:[], sel:null,
  ws:null, connected:false, compiled:false,
  // Wiring state
  wiring:null,  // {nodeId, port, x, y} — active wire drag
  drag:null,    // node drag
};

const WS = 'ws://127.0.0.1:7777';

// ── WebSocket ─────────────────────────────────────────────
function wsConnect() {
  if (G.ws) G.ws.close();
  G.ws = new WebSocket(WS);
  G.ws.onopen  = () => { G.connected=true; setDot('on','connected'); log('connected','ok'); send({action:'get_state'}); };
  G.ws.onmessage = e => onMsg(JSON.parse(e.data));
  G.ws.onclose   = () => { G.connected=false; setDot('','disconnected'); log('disconnected','err'); };
  G.ws.onerror   = () => { setDot('err','error'); log('cannot reach ws://127.0.0.1:7777','err'); };
}
function send(o) {
  if (G.ws?.readyState===1) G.ws.send(JSON.stringify(o));
  else log('not connected','err');
}

// ── Message dispatch ──────────────────────────────────────
function onMsg(m) {
  switch(m.event) {
    case 'state':          hydrate(m); break;
    case 'node_added':     nodeAdd(m); log(`+ ${m.id}  (${m.kind})`,'ev'); break;
    case 'node_removed':   nodeRemove(m.id); break;
    case 'edge_added':     edgeAdd(m); break;
    case 'edge_removed':   edgeRemove(m.from_id,m.from_port,m.to_id,m.to_port); break;
    case 'compiled':
      G.compiled=true; setNC(false);
      log(`compiled ✓  ${m.node_count} nodes · ${m.edge_count} edges`,'ok'); break;
    case 'shader_updated': log(`shader → ${m.node_id}`,'ev'); break;
    case 'param_updated':  log(`${m.node_id}.${m.param} = ${m.value.toFixed(3)}`,'ev'); break;
    case 'error':          log(`error: ${m.message}`,'err'); break;
    case 'ok':             log(m.ack,'ok'); break;
  }
}

function hydrate(snap) {
  document.getElementById('cv').innerHTML='';
  G.edges.forEach(e=>e.el?.remove());
  G.nodes={}; G.edges=[]; G.sel=null;
  G.compiled=snap.compiled; setNC(!snap.compiled);
  snap.nodes.forEach(nodeAdd);
  setTimeout(()=>snap.edges.forEach(edgeAdd),40);
  log(`state: ${snap.nodes.length} nodes · ${snap.edges.length} edges`,'ok');
}

// ── Node DOM ──────────────────────────────────────────────
function nodeAdd(d) {
  if (G.nodes[d.id]) return;
  const el=document.createElement('div');
  el.className=`node k-${d.kind}`;
  el.id='n-'+d.id;
  el.style.left=(d.position?.x??80)+'px';
  el.style.top =(d.position?.y??80)+'px';

  // Stripe
  const stripe=document.createElement('div'); stripe.className='stripe'; el.appendChild(stripe);

  // Header
  const hdr=document.createElement('div'); hdr.className='nhdr';
  hdr.innerHTML=`<span class="nbadge">${badge(d.kind)}</span><span class="nlbl">${d.label}</span><button class="nx">×</button>`;
  el.appendChild(hdr);

  // Ports
  const ports=document.createElement('div'); ports.className='nports';
  const ins=document.createElement('div'); ins.className='pcol ins';
  const outs=document.createElement('div'); outs.className='pcol outs';
  (d.input_ports||[]).forEach(p=>ins.appendChild(mkPort(d.id,p,'in')));
  (d.output_ports||[]).forEach(p=>outs.appendChild(mkPort(d.id,p,'out')));
  ports.appendChild(ins); ports.appendChild(outs); el.appendChild(ports);

  // Events
  hdr.addEventListener('mousedown', startDrag);
  el.addEventListener('mousedown', ev=>{
    // Don't select if clicking port or close button
    if(!ev.target.closest('.pdot')&&!ev.target.closest('.nx')) {
      ev.stopPropagation();
    }
  });
  el.addEventListener('click', ev=>{
    if(!ev.target.closest('.pdot')&&!ev.target.closest('.nx')) selectNode(d.id);
  });
  hdr.querySelector('.nx').addEventListener('click', ev=>{
    ev.stopPropagation();
    send({action:'remove_node',id:d.id}); setNC(true);
  });

  document.getElementById('cv').appendChild(el);
  G.nodes[d.id]={el,desc:d};
  updateLive();
}

function mkPort(nodeId, portName, dir) {
  const row=document.createElement('div'); row.className='prow';
  const dot=document.createElement('div'); dot.className='pdot';
  dot.dataset.node=nodeId; dot.dataset.port=portName; dot.dataset.dir=dir;
  dot.title=`${dir}: ${portName}`;
  const lbl=document.createElement('span'); lbl.className='plbl'; lbl.textContent=portName;
  if(dir==='in'){row.appendChild(dot);row.appendChild(lbl);}
  else{row.appendChild(lbl);row.appendChild(dot);}

  // ALL port interaction goes through mousedown only — no click events.
  // This avoids the click/mousedown race when wiring.
  dot.addEventListener('mousedown', portMouseDown);
  return row;
}

function nodeRemove(id) {
  G.nodes[id]?.el.remove();
  G.edges=G.edges.filter(e=>{
    if(e.from_id===id||e.to_id===id){e.el?.remove();return false;}
    return true;
  });
  delete G.nodes[id];
  if(G.sel===id){G.sel=null;renderProps(null);}
  updateLive();
}

function badge(k) {
  return {shader_source:'SRC',shader_pass:'SHD',crossfade:'MIX',
    matrix_mix4:'MTX',pixels_out:'OUT',syphon:'SYP'}[k]??k.slice(0,3).toUpperCase();
}

// ── Edge DOM ──────────────────────────────────────────────
function edgeAdd(d) {
  if(G.edges.find(e=>e.from_id===d.from_id&&e.from_port===d.from_port
                   &&e.to_id===d.to_id&&e.to_port===d.to_port)) return;
  const path=document.createElementNS('http://www.w3.org/2000/svg','path');
  path.classList.add('edge');
  // Src→Pass edges are code-only, style them differently
  const fromDesc=G.nodes[d.from_id]?.desc;
  const toDesc=G.nodes[d.to_id]?.desc;
  if(fromDesc?.kind==='shader_source'&&toDesc?.kind==='shader_pass') path.classList.add('src-edge');
  document.getElementById('el').insertBefore(path,document.getElementById('dw'));
  const edge={...d,el:path};
  G.edges.push(edge);
  drawEdge(edge);
  // Click edge to disconnect
  path.style.pointerEvents='visibleStroke';
  path.addEventListener('click',()=>{
    if(confirm(`Disconnect ${edge.from_id}.${edge.from_port} → ${edge.to_id}.${edge.to_port}?`)) {
      send({action:'disconnect',from_id:edge.from_id,from_port:edge.from_port,
            to_id:edge.to_id,to_port:edge.to_port});
      setNC(true);
    }
  });
  updateLive();
}

function edgeRemove(fi,fp,ti,tp) {
  const i=G.edges.findIndex(e=>e.from_id===fi&&e.from_port===fp&&e.to_id===ti&&e.to_port===tp);
  if(i>=0){G.edges[i].el?.remove();G.edges.splice(i,1);}
  updateLive();
}

function drawEdge(e) {
  const a=portPos(e.from_id,e.from_port,'out');
  const b=portPos(e.to_id,e.to_port,'in');
  if(!a||!b){e.el.setAttribute('d','');return;}
  e.el.setAttribute('d',bez(a.x,a.y,b.x,b.y));
}
function redrawEdges(){G.edges.forEach(drawEdge);}

function bez(x1,y1,x2,y2) {
  const dx=Math.abs(x2-x1)*.55+40;
  return `M${x1},${y1} C${x1+dx},${y1} ${x2-dx},${y2} ${x2},${y2}`;
}

function portPos(nodeId,port,dir) {
  const entry=G.nodes[nodeId]; if(!entry) return null;
  const dot=entry.el.querySelector(`.pdot[data-port="${port}"][data-dir="${dir}"]`);
  if(!dot) return null;
  const r=dot.getBoundingClientRect();
  const wr=document.getElementById('cw').getBoundingClientRect();
  return{x:r.left-wr.left+r.width/2,y:r.top-wr.top+r.height/2};
}

function updateLive() {
  document.querySelectorAll('.pdot').forEach(d=>d.classList.remove('live'));
  G.edges.forEach(e=>{
    G.nodes[e.from_id]?.el.querySelector(`.pdot[data-port="${e.from_port}"][data-dir="out"]`)?.classList.add('live');
    G.nodes[e.to_id  ]?.el.querySelector(`.pdot[data-port="${e.to_port}"][data-dir="in"]`)   ?.classList.add('live');
  });
}

// ── WIRING ────────────────────────────────────────────────
// How it works:
//   1. mousedown on an OUTPUT dot → starts wire (sets G.wiring, yellow dot, draft line)
//   2. mousemove → updates draft line
//   3. mousedown on an INPUT dot → completes connection
//   4. Esc or mousedown on background → cancels
//
// Everything is mousedown. No click events are used for wiring to avoid races.

function portMouseDown(ev) {
  ev.stopPropagation();
  ev.preventDefault();
  const dot=ev.currentTarget;
  const dir=dot.dataset.dir;
  const nodeId=dot.dataset.node;
  const port=dot.dataset.port;

  if(G.wiring) {
    // Second mousedown — finish the wire
    if(dir==='in') {
      finishWire(nodeId,port);
    } else {
      // Clicked another output — restart from here
      cancelWire();
      beginWire(dot,nodeId,port);
    }
    return;
  }

  if(dir==='out') {
    beginWire(dot,nodeId,port);
  } else {
    log('start a wire from an OUTPUT port (right side of node)','warn');
  }
}

function beginWire(dot,nodeId,port) {
  const wr=document.getElementById('cw').getBoundingClientRect();
  const r=dot.getBoundingClientRect();
  G.wiring={nodeId,port,x:r.left-wr.left+r.width/2,y:r.top-wr.top+r.height/2};
  dot.classList.add('wiring');
  // Highlight all valid input ports
  document.querySelectorAll('.pdot[data-dir="in"]').forEach(d=>{
    if(d.dataset.node!==nodeId) d.classList.add('can-connect');
  });
  document.getElementById('wh').classList.add('show');
}

function finishWire(toId,toPort) {
  const from=G.wiring; cancelWire();
  if(from.nodeId===toId){log('cannot connect a node to itself','warn');return;}
  send({action:'connect',from_id:from.nodeId,from_port:from.port,to_id:toId,to_port:toPort});
  setNC(true);
}

function cancelWire() {
  if(!G.wiring) return;
  document.querySelectorAll('.pdot.wiring').forEach(d=>d.classList.remove('wiring'));
  document.querySelectorAll('.pdot.can-connect').forEach(d=>d.classList.remove('can-connect'));
  G.wiring=null;
  document.getElementById('dw').setAttribute('d','');
  document.getElementById('wh').classList.remove('show');
}

// Mouse tracking for draft wire + node drag
document.addEventListener('mousemove',ev=>{
  if(G.wiring) {
    const wr=document.getElementById('cw').getBoundingClientRect();
    const mx=ev.clientX-wr.left,my=ev.clientY-wr.top;
    document.getElementById('dw').setAttribute('d',bez(G.wiring.x,G.wiring.y,mx,my));
  }
  if(G.drag) {
    const dx=ev.clientX-G.drag.sx,dy=ev.clientY-G.drag.sy;
    const entry=G.nodes[G.drag.id];
    if(entry){entry.el.style.left=(G.drag.nx+dx)+'px';entry.el.style.top=(G.drag.ny+dy)+'px';redrawEdges();}
  }
});

document.addEventListener('mouseup',ev=>{
  if(G.drag) {
    const entry=G.nodes[G.drag.id];
    if(entry) send({action:'move_node',id:G.drag.id,position:{
      x:parseInt(entry.el.style.left),y:parseInt(entry.el.style.top)}});
    G.drag=null;
  }
});

// Mousedown on canvas background = cancel wire + deselect
document.getElementById('cw').addEventListener('mousedown',ev=>{
  if(!ev.target.closest('.node')&&!ev.target.closest('.pdot')) {
    cancelWire(); selectNode(null);
  }
});

document.addEventListener('keydown',ev=>{if(ev.key==='Escape') cancelWire();});

// ── Node drag ─────────────────────────────────────────────
function startDrag(ev) {
  if(ev.target.closest('.nx')||ev.target.closest('.pdot')) return;
  ev.preventDefault();
  const nodeEl=ev.currentTarget.closest('.node');
  const id=nodeEl.id.replace('n-','');
  G.drag={id,sx:ev.clientX,sy:ev.clientY,
    nx:parseInt(nodeEl.style.left),ny:parseInt(nodeEl.style.top)};
}

// ── Selection + Props ──────────────────────────────────────
function selectNode(id) {
  document.querySelectorAll('.node.sel').forEach(n=>n.classList.remove('sel'));
  G.sel=id;
  if(id&&G.nodes[id]){G.nodes[id].el.classList.add('sel');renderProps(id);}
  else renderProps(null);
}

function renderProps(id) {
  const panel=document.getElementById('props');
  if(!id||!G.nodes[id]){panel.innerHTML='<div class="pempty">click a node<br/>to edit it</div>';return;}
  const d=G.nodes[id].desc;
  let h=`
    <div class="pf"><label>label</label><input class="pinput" id="p-lbl" value="${esc(d.label)}"/></div>
    <div class="pf"><label>id</label><input class="pinput" value="${esc(d.id)}" readonly/></div>
    <div class="pf"><label>kind</label><input class="pinput" value="${esc(d.kind)}" readonly/></div>`;

  if(d.mix!=null) h+=`<div class="pf"><label>mix (0–1)</label>
    <div class="prow-s">
      <input type="range" class="pslider" id="p-mix" min="0" max="1" step="0.01" value="${d.mix}"/>
      <span class="pval" id="p-mv">${d.mix.toFixed(2)}</span>
    </div></div>`;

  if(d.frag!=null) h+=`<div class="pf"><label>fragment shader</label>
    <textarea class="sbox" id="p-frag" spellcheck="false">${esc(d.frag)}</textarea>
    <button class="abtn" id="p-apply">▶ apply shader (no recompile needed)</button></div>`;

  panel.innerHTML=h;

  panel.querySelector('#p-mix')?.addEventListener('input',e=>{
    const v=parseFloat(e.target.value);
    panel.querySelector('#p-mv').textContent=v.toFixed(2);
    d.mix=v; send({action:'set_mix',node_id:id,mix:v});
  });
  panel.querySelector('#p-apply')?.addEventListener('click',()=>{
    const frag=panel.querySelector('#p-frag').value;
    d.frag=frag; send({action:'set_shader',node_id:id,frag});
    log(`shader → ${id} (takes effect after compile)`, 'ok');
  });
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── Node palette ──────────────────────────────────────────
let _ni=0;
document.querySelectorAll('.ngbtn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const kind=btn.dataset.kind,label=btn.dataset.label,idx=++_ni;
    const id=`${kind}_${idx}`;
    const x=80+Math.random()*260,y=60+Math.random()*180;
    send({action:'add_node',id,kind,label:`${label} ${idx}`,position:{x,y}});
    setNC(true);
  });
});

// ── Header buttons ────────────────────────────────────────
document.getElementById('btn-connect').addEventListener('click',wsConnect);
document.getElementById('btn-compile').addEventListener('click',()=>send({action:'compile'}));

// ── Templates ────────────────────────────────────────────
// Each template uses the correct engine topology:
//   ShaderSource → PassA  : code edge (no texture)
//   PassA → PassB         : texture edge (iChannel0)
//   PassA/B → PixelsOut   : present to screen

function clearAndBuild(fn) {
  if(!G.connected){log('connect first','warn');return;}
  Object.keys(G.nodes).forEach(id=>send({action:'remove_node',id}));
  setTimeout(fn,250);
}

function thenConnect(edges,delay,fn){
  setTimeout(()=>{edges.forEach(e=>send({action:'connect',...e}));setTimeout(fn,150);},delay);
}

const TEMPLATES = {

  basic() {
    // Minimal: ShaderSource → ShaderPass → PixelsOut
    // Shader on source, no second pass
    clearAndBuild(()=>{
      send({action:'add_node',id:'src_0', kind:'shader_source',label:'Source', position:{x:60,y:140}});
      send({action:'add_node',id:'pass_0',kind:'shader_pass',  label:'Output Pass',position:{x:310,y:140}});
      send({action:'add_node',id:'out_0', kind:'pixels_out',   label:'Output',position:{x:560,y:140}});
      thenConnect([
        {from_id:'src_0',from_port:'out',to_id:'pass_0',to_port:'in'},
        {from_id:'pass_0',from_port:'out',to_id:'out_0',to_port:'in'},
      ],150,()=>{
        send({action:'set_shader',node_id:'src_0',frag:`#version 330 core
in vec2 v_uv;
out vec4 fragColor;
uniform float u_time;
void main() {
  vec3 col = 0.5 + 0.5 * cos(u_time + v_uv.xyx + vec3(0.0, 2.1, 4.2));
  fragColor = vec4(col, 1.0);
}`});
        setTimeout(()=>{ send({action:'compile'}); log('basic template loaded','ok'); },120);
      });
    });
  },

  twostage() {
    // ShaderSource → PassA → PassB → PixelsOut
    // PassA generates, PassB applies vignette reading iChannel0
    clearAndBuild(()=>{
      send({action:'add_node',id:'src_0', kind:'shader_source',label:'Source',  position:{x:40, y:140}});
      send({action:'add_node',id:'pass_0',kind:'shader_pass',  label:'Stage A', position:{x:260,y:140}});
      send({action:'add_node',id:'pass_1',kind:'shader_pass',  label:'Stage B', position:{x:480,y:140}});
      send({action:'add_node',id:'out_0', kind:'pixels_out',   label:'Output',  position:{x:700,y:140}});
      thenConnect([
        {from_id:'src_0', from_port:'out',to_id:'pass_0',to_port:'in'},
        {from_id:'pass_0',from_port:'out',to_id:'pass_1',to_port:'in'},
        {from_id:'pass_1',from_port:'out',to_id:'out_0', to_port:'in'},
      ],150,()=>{
        send({action:'set_shader',node_id:'src_0',frag:`#version 330 core
in vec2 v_uv;
out vec4 fragColor;
uniform float u_time;
void main() {
  vec3 col = 0.5 + 0.5 * cos(u_time + v_uv.xyx + vec3(0.0, 2.1, 4.2));
  fragColor = vec4(col, 1.0);
}`});
        send({action:'set_shader',node_id:'pass_1',frag:`#version 330 core
in vec2 v_uv;
out vec4 fragColor;
uniform sampler2D iChannel0;
uniform float u_time;
void main() {
  vec4 c = texture(iChannel0, v_uv);
  vec2 uv = v_uv - 0.5;
  float vig = 1.0 - dot(uv,uv) * 1.8;
  fragColor = vec4(c.rgb * vig, 1.0);
}`});
        setTimeout(()=>{ send({action:'compile'}); log('two-stage template loaded','ok'); },120);
      });
    });
  },

  crossfade() {
    // SrcA → PassA ─┐
    //                ├→ Crossfade → PixelsOut
    // SrcB → PassB ─┘
    clearAndBuild(()=>{
      send({action:'add_node',id:'src_a', kind:'shader_source',label:'Source A',position:{x:40, y:60}});
      send({action:'add_node',id:'pass_a',kind:'shader_pass',  label:'Pass A',  position:{x:260,y:60}});
      send({action:'add_node',id:'src_b', kind:'shader_source',label:'Source B',position:{x:40, y:220}});
      send({action:'add_node',id:'pass_b',kind:'shader_pass',  label:'Pass B',  position:{x:260,y:220}});
      send({action:'add_node',id:'mix_0', kind:'crossfade',    label:'Crossfade',position:{x:480,y:140}});
      send({action:'add_node',id:'out_0', kind:'pixels_out',   label:'Output',  position:{x:680,y:140}});
      thenConnect([
        {from_id:'src_a', from_port:'out',to_id:'pass_a',to_port:'in'},
        {from_id:'src_b', from_port:'out',to_id:'pass_b',to_port:'in'},
        {from_id:'pass_a',from_port:'out',to_id:'mix_0', to_port:'a'},
        {from_id:'pass_b',from_port:'out',to_id:'mix_0', to_port:'b'},
        {from_id:'mix_0', from_port:'out',to_id:'out_0', to_port:'in'},
      ],150,()=>{
        send({action:'set_shader',node_id:'src_a',frag:`#version 330 core
in vec2 v_uv;
out vec4 fragColor;
uniform float u_time;
void main() {
  vec3 col = 0.5 + 0.5 * cos(u_time + v_uv.xyx + vec3(0.0, 2.1, 4.2));
  fragColor = vec4(col, 1.0);
}`});
        send({action:'set_shader',node_id:'src_b',frag:`#version 330 core
in vec2 v_uv;
out vec4 fragColor;
uniform float u_time;
void main() {
  vec2 uv = v_uv * 8.0;
  float g = mod(floor(uv.x)+floor(uv.y),2.0);
  vec3 col = mix(vec3(0.05,0.05,0.1),vec3(0.2,0.5,1.0),g);
  col *= 0.6+0.4*sin(u_time*2.0);
  fragColor = vec4(col, 1.0);
}`});
        setTimeout(()=>{ send({action:'compile'}); log('crossfade template — adjust Mix in properties','ok'); },120);
      });
    });
  },

  plasma() {
    // No ShaderSource — shader lives directly on the pass (path 1)
    // PassA generates plasma → PassB adds scanlines → PixelsOut
    clearAndBuild(()=>{
      send({action:'add_node',id:'pass_0',kind:'shader_pass',label:'Plasma',   position:{x:80, y:140}});
      send({action:'add_node',id:'pass_1',kind:'shader_pass',label:'Scanlines',position:{x:330,y:140}});
      send({action:'add_node',id:'out_0', kind:'pixels_out', label:'Output',   position:{x:570,y:140}});
      thenConnect([
        {from_id:'pass_0',from_port:'out',to_id:'pass_1',to_port:'in'},
        {from_id:'pass_1',from_port:'out',to_id:'out_0', to_port:'in'},
      ],150,()=>{
        send({action:'set_shader',node_id:'pass_0',frag:`#version 330 core
in vec2 v_uv;
out vec4 fragColor;
uniform float u_time;
void main() {
  vec2 uv = v_uv * 3.0;
  float v = sin(uv.x + u_time);
  v += sin(uv.y + u_time * 0.7);
  v += sin((uv.x + uv.y + u_time * 0.5));
  v += sin(length(uv) + u_time * 1.3);
  vec3 col = vec3(sin(v*3.14),sin(v*3.14+2.09),sin(v*3.14+4.19))*0.5+0.5;
  fragColor = vec4(col,1.0);
}`});
        send({action:'set_shader',node_id:'pass_1',frag:`#version 330 core
in vec2 v_uv;
out vec4 fragColor;
uniform sampler2D iChannel0;
uniform float u_time;
uniform vec2 u_resolution;
void main() {
  vec4 c = texture(iChannel0, v_uv);
  float scan = 0.85 + 0.15 * sin(v_uv.y * u_resolution.y * 1.5);
  fragColor = vec4(c.rgb * scan, 1.0);
}`});
        setTimeout(()=>{ send({action:'compile'}); log('plasma + scanlines — no ShaderSource node needed','ok'); },120);
      });
    });
  },

  tunnel() {
    // UV tunnel effect — single pass, self-contained
    clearAndBuild(()=>{
      send({action:'add_node',id:'pass_0',kind:'shader_pass',label:'UV Tunnel',position:{x:120,y:140}});
      send({action:'add_node',id:'out_0', kind:'pixels_out', label:'Output',   position:{x:380,y:140}});
      thenConnect([
        {from_id:'pass_0',from_port:'out',to_id:'out_0',to_port:'in'},
      ],150,()=>{
        send({action:'set_shader',node_id:'pass_0',frag:`#version 330 core
in vec2 v_uv;
out vec4 fragColor;
uniform float u_time;
void main() {
  vec2 uv = v_uv * 2.0 - 1.0;
  float r = length(uv);
  float a = atan(uv.y, uv.x);
  float t = u_time * 0.4;
  vec2 tuv = vec2(0.3/r + t, a/3.14159);
  float stripe = 0.5 + 0.5*sin(tuv.x * 20.0);
  float ring   = 0.5 + 0.5*sin(tuv.y * 12.0 + t*4.0);
  vec3 col = vec3(stripe*ring) * vec3(0.4+0.6*sin(t+r),0.5,1.0-r*0.3);
  col *= smoothstep(1.5, 0.2, r); // fade edges
  fragColor = vec4(col, 1.0);
}`});
        setTimeout(()=>{ send({action:'compile'}); log('UV tunnel — single ShaderPass, no source node','ok'); },120);
      });
    });
  },
};

document.querySelectorAll('.tmbtn').forEach(btn=>{
  btn.addEventListener('click',()=>TEMPLATES[btn.dataset.tmpl]?.());
});

// ── Utilities ─────────────────────────────────────────────
function setDot(cls,txt){
  document.getElementById('dot').className='dot '+cls;
  document.getElementById('stxt').textContent=txt;
}
function setNC(v){
  G.compiled=!v;
  document.getElementById('nc').classList.toggle('show',v);
}
function log(msg,type=''){
  const a=document.getElementById('log');
  const r=document.createElement('div'); r.className='le '+type;
  const now=new Date();
  const t=[now.getHours(),now.getMinutes(),now.getSeconds()].map(n=>String(n).padStart(2,'0')).join(':');
  r.innerHTML=`<span class="lt">${t}</span><span class="lm">${msg}</span>`;
  a.appendChild(r); a.scrollTop=a.scrollHeight;
  while(a.children.length>300) a.removeChild(a.firstChild);
}

window.addEventListener('load',()=>{
  log('scheng editor ready','ok');
  log('run: cargo run -p scheng-bridge','');
  log('then: connect → pick a template','');
});
</script>
